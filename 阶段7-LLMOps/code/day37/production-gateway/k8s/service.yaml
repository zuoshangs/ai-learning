apiVersion: v1
kind: Service
metadata:
  name: production-gateway
  namespace: llm-gateway
  labels:
    app: production-gateway
spec:
  selector:
    app: production-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
