server.port=8081

# Semantic cache config
cache.similarity-threshold=0.55
cache.max-size=1000
cache.default-ttl-seconds=3600

# LLM config for cache misses (api-key read from env/local.properties)
cache.llm.endpoint=https://api.deepseek.com/chat/completions
cache.llm.api-key=
cache.llm.model=deepseek-v4-flash
cache.llm.timeout-ms=30000

# Logging
logging.level.com.ai.learning.cache=INFO

# Import local config
spring.config.import=local.properties

# Health endpoint
management.endpoints.web.exposure.include=health
