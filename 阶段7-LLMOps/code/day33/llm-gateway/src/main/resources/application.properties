spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

server.port=8080

# DeepSeek provider via gateway config (api-key read from env)
gateway.llm.endpoint=https://api.deepseek.com/chat/completions
gateway.llm.api-key=
gateway.llm.model=deepseek-v4-flash
gateway.llm.timeout-ms=30000

# Rate limit: token-bucket or sliding-window
gateway.rate-limit-type=token-bucket
gateway.default-rate-per-minute=60

# Circuit breaker
gateway.circuit-breaker.failure-threshold=5
gateway.circuit-breaker.reset-timeout-ms=30000
gateway.circuit-breaker.half-open-max-requests=3

# Built-in API keys (in production, use secret manager)
gateway.api-keys.sk-gold-tier=Gold VIP
gateway.api-keys.sk-silver-tier=Silver Standard
gateway.api-keys.sk-free-tier=Free Tier

# Override rate limits for specific keys
gateway.rate-overrides.sk-gold-tier=1000
gateway.rate-overrides.sk-silver-tier=200

# Expose health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Logging
logging.level.com.ai.learning.gateway=INFO

# Import local config (contains API key, not in git)
spring.config.import=local.properties
