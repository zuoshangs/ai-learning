server.port=8082

# Application info
spring.application.name=llm-observability

# Expose all actuator endpoints including Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# Prometheus
management.prometheus.metrics.export.enabled=true

# Enable trace ID in log pattern
logging.pattern.level=%5p [traceId=%X{traceId:-NO-TRACE}]
logging.level.com.ai.learning.obs=INFO

# Simulated load generation
simulation.requests-per-minute=30
simulation.enabled=true
