# Test profile configuration
server.port=0

spring.ai.openai.api-key=test-key
spring.ai.openai.base-url=http://localhost:9999
spring.ai.openai.chat.options.model=deepseek-chat

spring.thymeleaf.cache=false

app.chat.max-history=10
app.chat.max-tokens=1024
app.chat.temperature=0.7
app.ollama.url=http://localhost:11434
app.ollama.model=qwen2.5:0.5b
app.knowledge.chunk-size=500
app.knowledge.chunk-overlap=50
app.ticket.auto-assign=true
app.rate-limit.capacity=20
app.rate-limit.refill-rate=5
app.cache.ttl-seconds=300
app.cache.max-size=200
