# ============================================================
# GitHub Actions CI/CD — cs-platform
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - '阶段8-综合项目/code/day42/**'
      - '阶段8-综合项目/code/day41/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cs-platform
  JAVA_VERSION: '21'

jobs:
  # ---- Test ----
  test:
    name: 🔍 Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 阶段8-综合项目/code/day42/cs-platform

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile and run tests
        run: mvn test -B
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'sk-test' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '阶段8-综合项目/code/day42/cs-platform/target/surefire-reports/**'

  # ---- Build & Publish Docker Image ----
  docker:
    name: 🐳 Build & Publish
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: 阶段8-综合项目/code/day42/cs-platform

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: 阶段8-综合项目/code/day42/cs-platform
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
