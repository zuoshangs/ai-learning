server:
  port: 8080

spring:
  application:
    name: cs-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/cs_platform
    username: aiuser
    password: aiuser123
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        initialize-schema: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  config:
    import: file:local.properties

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  chat:
    max-history: 10
    max-tokens: 1024
    temperature: 0.7
  knowledge:
    chunk-size: 500
    chunk-overlap: 50
  ticket:
    auto-assign: true
