spring:
  application:
    name: spring-ai-structured

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3   # 结构化输出用较低温度，输出更稳定
          max-tokens: 1024

server:
  port: 8081   # 与Day 16不同端口，避免冲突
