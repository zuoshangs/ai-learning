<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
.chat-container { width: 420px; height: 680px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
.header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 18px 20px; }
.header h2 { font-size: 16px; }
.header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
.messages { flex: 1; overflow-y: auto; padding: 16px; background: #f8f9ff; }
.msg { margin-bottom: 14px; display: flex; flex-direction: column; }
.msg.user { align-items: flex-end; }
.msg.bot { align-items: flex-start; }
.msg .bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user .bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; }
.msg.bot .bubble { background: white; color: #333; border: 1px solid #e8ecf4; border-bottom-left-radius: 4px; }
.msg .label { font-size: 11px; color: #999; margin: 4px 8px; }
.typing .bubble::after { content: '...'; animation: dots 1.5s infinite; }
@keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
.input-area { display: flex; padding: 12px 16px; border-top: 1px solid #e8ecf4; background: white; gap: 8px; }
.input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
.input-area input:focus { border-color: #667eea; }
.input-area button { width: 44px; height: 44px; border-radius: 50%; border: none; background: #667eea; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.intent-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; }
.intent-order { background: #fff3e0; color: #e65100; }
.intent-refund { background: #fce4ec; color: #c62828; }
.intent-tech { background: #e3f2fd; color: #1565c0; }
.intent-complaint { background: #f3e5f5; color: #6a1b9a; }
.intent-general { background: #e8f5e9; color: #2e7d32; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <h2>🤖 AI 智能客服</h2>
    <div class="sub">意图识别 · 流式输出 · 多轮记忆</div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="bubble">您好！我是智能客服助手 👋<br><br>可以帮您处理：<br>• 📦 订单查询<br>• 💰 退款售后<br>• 🔧 技术支持<br>• 💬 投诉反馈<br><br>请问有什么可以帮您的？</div>
    </div>
  </div>
  <div class="input-area">
    <input id="input" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter') send()" autofocus>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>
<script>
let sessionId = '';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function addMsg(role, text, intent) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let intentHtml = '';
  if (intent && intent !== 'general') {
    const labels = { order: '📦 订单', refund: '💰 售后', tech: '🔧 技术', complaint: '💬 投诉', general: '💬 咨询' };
    const label = labels[intent] || intent;
    intentHtml = `<div class="intent-tag intent-${intent}">${label}</div>`;
  }
  div.innerHTML = (role === 'bot' ? intentHtml : '') + `<div class="bubble">${text}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = '<div class="bubble"></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function send() {
  const msg = inputEl.value.trim();
  if (!msg) return;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;

  addMsg('user', msg);

  const typingEl = addTyping();

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message: msg })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullReply = '';
    let meta = {};

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const text = decoder.decode(value);
      const lines = text.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5);

        try {
          const json = JSON.parse(data);
          if (json.type === 'meta') {
            sessionId = json.sessionId;
            meta.intent = json.intent;
          } else if (json.type === 'done') {
            // done
          }
        } catch {
          // raw text chunk
          fullReply += data;
          typingEl.innerHTML = `<div class="bubble">${fullReply.replace(/\n/g, '<br>')}</div>`;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    }

    // 替换 typing 为最终消息
    typingEl.className = 'msg bot';
    const bubble = typingEl.querySelector('.bubble');
    if (bubble) {
      bubble.innerHTML = fullReply.replace(/\n/g, '<br>');
    }
    if (meta.intent && meta.intent !== 'general') {
      const labels = { order: '📦 订单', refund: '💰 售后', tech: '🔧 技术', complaint: '💬 投诉' };
      const tag = document.createElement('div');
      tag.className = `intent-tag intent-${meta.intent}`;
      tag.textContent = labels[meta.intent] || meta.intent;
      typingEl.insertBefore(tag, typingEl.firstChild);
    }

  } catch (err) {
    typingEl.className = 'msg bot';
    typingEl.innerHTML = '<div class="bubble">😔 网络连接失败，请稍后重试</div>';
  }

  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
