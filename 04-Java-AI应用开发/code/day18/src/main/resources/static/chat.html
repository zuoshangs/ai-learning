<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 流式聊天 - SSE 打字机效果</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column;
  }
  .header {
    background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 18px; color: #38bdf8; }
  .header span { font-size: 12px; color: #64748b; }
  .chat-box {
    flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px;
  }
  .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
  .user { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
  .assistant {
    background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px;
    border: 1px solid #334155;
  }
  .assistant.streaming { border-color: #38bdf8; }
  .cursor {
    display: inline-block; width: 2px; height: 1em; background: #38bdf8;
    animation: blink 0.8s infinite; margin-left: 2px; vertical-align: middle;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .input-area {
    padding: 16px 24px; background: #1e293b; border-top: 1px solid #334155;
    display: flex; gap: 12px;
  }
  input {
    flex: 1; padding: 12px 16px; border: 1px solid #334155; border-radius: 8px;
    background: #0f172a; color: #e2e8f0; font-size: 14px; outline: none;
  }
  input:focus { border-color: #38bdf8; }
  button {
    padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-send { background: #2563eb; color: white; }
  .btn-send:hover { background: #1d4ed8; }
  .btn-send:disabled { background: #475569; cursor: not-allowed; }
  .btn-clear { background: #334155; color: #94a3b8; }
  .btn-clear:hover { background: #475569; }
  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #475569; font-size: 14px; text-align: center; line-height: 2;
  }
  .session-info { font-size: 12px; color: #64748b; padding: 8px 24px 0; }
  .typing-indicator { display: flex; gap: 4px; align-items: center; }
  .typing-dot { width: 6px; height: 6px; background: #64748b; border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>💬 AI 流式聊天</h1>
    <span>多轮记忆 + SSE 打字机效果</span>
  </div>
  <div>
    <span id="sessionDisplay" style="font-size:12px;color:#64748b;margin-right:12px;"></span>
    <button class="btn-clear" onclick="newSession()">🔄 新会话</button>
  </div>
</div>

<div class="session-info">
  会话 ID: <span id="sessionLabel">-</span> · <span id="historyCount">0</span> 轮对话
</div>

<div class="chat-box" id="chatBox">
  <div class="empty-state" id="emptyState">
    👋 输入消息开始对话<br>
    <small>AI 会记住上下文，支持多轮对话</small>
  </div>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="输入消息..." autofocus
         onkeydown="if(event.key==='Enter') send()">
  <button class="btn-send" id="sendBtn" onclick="send()">发送</button>
</div>

<script>
let sessionId = '';
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');
const sessionLabel = document.getElementById('sessionLabel');
const historyCount = document.getElementById('historyCount');
const sessionDisplay = document.getElementById('sessionDisplay');

// 创建新会话
async function newSession() {
  const res = await fetch('/session', { method: 'POST' });
  const data = await res.json();
  sessionId = data.sessionId;
  sessionLabel.textContent = sessionId;
  sessionDisplay.textContent = '会话: ' + sessionId;
  chatBox.innerHTML = '';
  chatBox.appendChild(emptyState);
  emptyState.style.display = 'flex';
  historyCount.textContent = '0';
}

// 添加消息气泡
function addMessage(role, content, streaming = false) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'message ' + role;
  if (streaming) div.classList.add('streaming');
  
  if (streaming) {
    const textSpan = document.createElement('span');
    textSpan.className = 'text-content';
    div.appendChild(textSpan);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    div.appendChild(cursor);
  } else {
    div.textContent = content;
  }
  
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

// 获取最后一条assistant消息
function getLastAssistantMsg() {
  const msgs = chatBox.querySelectorAll('.message.assistant:not(.streaming)');
  return msgs.length > 0 ? msgs[msgs.length - 1] : null;
}

// 发送消息
async function send() {
  const msg = input.value.trim();
  if (!msg || !sessionId) return;
  
  input.value = '';
  addMessage('user', msg);
  sendBtn.disabled = true;
  input.disabled = true;
  
  // 判定是流式还是非流式（长消息用流式）
  const useStream = msg.length > 5;
  
  if (useStream) {
    // 流式输出（SSE 打字机效果）
    const msgDiv = addMessage('assistant', '', true);
    const textContent = msgDiv.querySelector('.text-content');
    
    try {
      const response = await fetch(`/chat/stream?session=${sessionId}&msg=${encodeURIComponent(msg)}`);
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        
        buffer += decoder.decode(value, { stream: true });
        // 解析 SSE 格式: data: xxx\n\n
        const lines = buffer.split('\n\n');
        buffer = lines.pop() || '';
        
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const chunk = line.substring(6);
            textContent.textContent += chunk;
            chatBox.scrollTop = chatBox.scrollHeight;
          }
        }
      }
      
      // 移除闪烁光标
      const cursor = msgDiv.querySelector('.cursor');
      if (cursor) cursor.remove();
      msgDiv.classList.remove('streaming');
      historyCount.textContent = chatBox.querySelectorAll('.message.user').length;
      
    } catch (e) {
      textContent.textContent = '[连接错误]';
    }
  } else {
    // 同步对话
    try {
      const res = await fetch(`/chat?session=${sessionId}&msg=${encodeURIComponent(msg)}`);
      const text = await res.text();
      addMessage('assistant', text);
      historyCount.textContent = chatBox.querySelectorAll('.message.user').length;
    } catch (e) {
      addMessage('assistant', '[连接错误]');
    }
  }
  
  sendBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

// 初始化
newSession();
</script>
</body>
</html>
