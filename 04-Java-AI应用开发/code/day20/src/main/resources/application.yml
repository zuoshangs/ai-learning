server:
  port: 8080

spring:
  application:
    name: spring-ai-rag

  # ─── 数据源配置：PostgreSQL + PgVector ───
  datasource:
    url: jdbc:postgresql://localhost:5432/airag
    username: spring
    password: spring123
    driver-class-name: org.postgresql.Driver

  ai:
    # ─── DeepSeek 聊天模型 ───
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.1
      embedding:
        enabled: false

    # ─── Ollama 本地 Embedding 模型 ───
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
      embedding:
        options:
          model: qwen2.5:0.5b

    # ─── PgVector 向量存储配置 ───
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 896
        remove-existing-vector-store-table: true
        initialize-schema: true

logging:
  level:
    org.springframework.ai: DEBUG
