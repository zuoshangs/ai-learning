spring.application.name=agent-security
server.port=8080

# Spring AI - DeepSeek
spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-v4-flash
spring.ai.openai.chat.options.temperature=0.7

# 注入检测配置
security.injection.pattern-file=classpath:injection-patterns.json
security.injection.enabled=true

# 敏感信息配置
security.sensitive.patterns=1[3-9]\\d{9},\\d{18}[0-9Xx],\\d{6}\\s*\\d{8}\\s*\\d{3}[0-9Xx]

# 频率限制
security.rate-limit.max-per-minute=30

# 日志
logging.level.com.ai.learning=DEBUG
